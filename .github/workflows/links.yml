name: Links

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 7 * * 1" # Mondays — catch external link rot
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.161.1
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Build with Hugo
        run: hugo --gc --minify --baseURL "https://listenup.audio/"
      # On push/PR: offline check of internal links only (deterministic, fails build).
      # On the weekly schedule: full check incl. external links (informational).
      - name: Link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            ${{ github.event_name == 'schedule' && '' || '--offline' }}
            --root-dir ${{ github.workspace }}/public
            "public/**/*.html"
          fail: ${{ github.event_name != 'schedule' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
