baseURL = "https://example.org/"
locale = "en-us"
title = "ListenUp"
enableInlineShortcodes = true
disableKinds = ["taxonomy", "term"]   # docs site: no tags/categories

[params]
  version = "0.6.0"   # fallback only; live value pulled from the main repo's VERSION at build (partials/version.html)
  tagline = "Your audiobooks. Your server."
  description = "The self-hosted audiobook server. Your library, your metadata, your rules — on every device you own."
  githubRepo = "https://github.com/ListenUpApp/website"
  githubEditBase = "https://github.com/ListenUpApp/website/edit/main/content"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
    lineNos = false
    tabWidth = 4
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

[outputs]
  home = ["HTML", "JSON"]

[[menu.main]]
  name = "Home"
  pageRef = "/"
  weight = 10

[[menu.main]]
  name = "Guides"
  pageRef = "/getting-started/installation"
  weight = 20

[[menu.main]]
  name = "Apps"
  url = "/#apps"
  weight = 30

[[menu.main]]
  name = "Changelog"
  pageRef = "/help/changelog"
  weight = 40
