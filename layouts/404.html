{{ define "main" }}
<div class="home">
  <section class="hero" style="grid-template-columns:1fr;text-align:center;padding:120px 0 100px;">
    <div>
      <div class="eyebrow" style="justify-content:center;"><span class="pulse"></span>404</div>
      <h1>This page wandered off.</h1>
      <p class="sub" style="margin-left:auto;margin-right:auto;">We couldn't find what you were looking for. It may have moved, or never existed. Try the docs home or search.</p>
      <div class="hero-cta" style="justify-content:center;">
        <a class="btn-primary" href="{{ "/" | relURL }}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 10.5 12 3l9 7.5M5 9.5V21h14V9.5"/></svg>
          Go home
        </a>
        <button type="button" class="btn-secondary" onclick="openSearch()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          Search docs
        </button>
      </div>
    </div>
  </section>
</div>
{{ end }}
