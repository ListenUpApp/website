{{- $lang := .Type | default "text" -}}
{{- $file := .Attributes.file -}}
<div class="code">
  <div class="code-bar">
    <span class="fname">{{ with $file }}{{ . }}{{ else }}{{ $lang }}{{ end }}</span>
    <span class="grow"></span>
    <span class="lang">{{ $lang }}</span>
    <button class="copy-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg><span class="lbl">Copy</span></button>
  </div>
  {{ highlight (strings.TrimRight "\n" .Inner) $lang "" }}
</div>
