{{- /* Wrap tables so wide reference tables scroll horizontally on small screens
       instead of overflowing the page. */ -}}
<div class="table-wrap">
  <table>
    <thead>
      {{- range .THead }}
      <tr>{{ range . }}<th{{ with .Alignment }} style="text-align: {{ . }};"{{ end }}>{{ .Text }}</th>{{ end }}</tr>
      {{- end }}
    </thead>
    <tbody>
      {{- range .TBody }}
      <tr>{{ range . }}<td{{ with .Alignment }} style="text-align: {{ . }};"{{ end }}>{{ .Text }}</td>{{ end }}</tr>
      {{- end }}
    </tbody>
  </table>
</div>
