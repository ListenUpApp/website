<nav class="nav">
  <button type="button" class="icon-btn nav-burger" onclick="toggleNav()" aria-label="Menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
  </button>
  <a class="nav-brand" href="{{ "/" | relURL }}">
    {{ partial "logo-mark.html" . }}
    <span class="wm">Listen<b>Up</b></span>
    <span class="docs-tag">Docs</span>
  </a>
  <div class="nav-links">
    {{ range .Site.Menus.main }}
      {{ $u := "" }}{{ with .Page }}{{ $u = .RelPermalink }}{{ else }}{{ $u = .URL | relURL }}{{ end }}
      <a href="{{ $u }}"{{ if $.IsMenuCurrent "main" . }} class="on"{{ end }}>{{ .Name }}</a>
    {{ end }}
  </div>
  <div class="nav-spacer"></div>
  <button type="button" class="search-trig" onclick="openSearch()" aria-label="Search">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <span class="lbl">Search docs…</span>
    <kbd>⌘K</kbd>
  </button>
  <a class="icon-btn" href="{{ .Site.Params.githubRepo }}" aria-label="GitHub" title="GitHub">
    {{ partial "icon" "github" }}
  </a>
  <button type="button" class="icon-btn theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/></svg>
    <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 14.5A8 8 0 0 1 9.5 4 8 8 0 1 0 20 14.5Z"/></svg>
  </button>
</nav>
