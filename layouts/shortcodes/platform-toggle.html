{{- /* platform-toggle — iOS/Android segmented control. Sets [data-platform] on
       <html> (persisted via docs.js); device screenshots from the shots/shot
       shortcodes follow the selection. Place once near the top of a page. */ -}}
<div class="plat-toggle">
  <span class="pt-label">Showing screenshots for</span>
  <div class="seg" role="group" aria-label="Choose platform">
    <button type="button" data-os="ios" onclick="luSetPlatform('ios')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 12c0-2 1.6-3 1.7-3-1-1.4-2.4-1.6-2.9-1.6-1.2-.1-2.4.7-3 .7-.6 0-1.6-.7-2.6-.7-1.3 0-2.6.8-3.3 2-1.4 2.4-.4 6 1 8 .6 1 1.4 2 2.4 2 .9 0 1.3-.6 2.4-.6 1.1 0 1.4.6 2.4.6s1.7-.9 2.3-1.9c.7-1 1-2 1-2.1-.1 0-2.9-1.1-2.9-3.9ZM14 5.5c.5-.7.9-1.6.8-2.5-.8 0-1.7.5-2.3 1.2-.5.6-.9 1.5-.8 2.4.9 0 1.8-.4 2.3-1.1Z"/></svg>iOS</button>
    <button type="button" data-os="android" onclick="luSetPlatform('android')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 10v6a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-6M5 10a7 7 0 0 1 14 0M5 10h14M8 6 6.5 4M16 6l1.5-2M9.5 13h.01M14.5 13h.01"/></svg>Android</button>
  </div>
</div>
